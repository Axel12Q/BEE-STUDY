<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aprender Álgebra | Abeja GO 🐝</title>
    
    <link rel="icon" type="image/png" href="img/favicon-logo.png">
    <meta name="theme-color" content="#FFD700">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* =========================================
           RESETEO GLOBAL Y VARIABLES
           ========================================= */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        :root {
            --primary-yellow: #FFD700; 
            --primary-yellow-hover: #ffdf00;
            --primary-blue: #78ccdd; 
            --primary-blue-dark: #5ab0c1; 
            --secondary-orange: #FF9600; 
            --abeja-white: #FFFFFF;
            --abeja-dark: #3C3C3C;
            --abeja-gray-light: #F0F0F0;
            --abeja-gray-medium: #E5E5E5;
            --abeja-gray-dark: #AFAFAF;
            --abeja-bg: #FFFFFF;
            
            --sidebar-width: 260px;
            --right-panel-width: 340px;
        }

        /* Evitar scroll horizontal estricto en toda la página */
        html, body {
            overflow-x: clip !important;
            max-width: 100vw;
        }

        body.app-body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--abeja-bg);
            color: var(--abeja-dark);
            margin: 0;
            padding: 0;
        }

        /* =========================================
           ESTRUCTURA PRINCIPAL (FLEX)
           ========================================= */
        .app-layout {
            display: flex;
            width: 100%;
            min-height: 100vh;
        }

        /* =========================================
           SIDEBAR IZQUIERDO (PEGADO A LA IZQUIERDA)
           ========================================= */
        .app-sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: var(--sidebar-width);
            height: 100vh;
            padding: 30px 20px;
            border-right: 2px solid var(--abeja-gray-light);
            background-color: var(--abeja-white);
            z-index: 100;
            display: flex;
            flex-direction: column;
        }

        .sidebar-brand {
            font-weight: 900;
            color: var(--primary-yellow) !important;
            font-size: 2.2rem;
            text-decoration: none;
            margin-bottom: 50px;
            padding-left: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .sidebar-brand i { font-size: 2rem; }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .sidebar-nav .nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 14px 18px;
            text-decoration: none;
            color: var(--abeja-dark);
            font-weight: 800;
            font-size: 1.15rem;
            border-radius: 16px;
            transition: background-color 0.2s, transform 0.1s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .sidebar-nav .nav-item i {
            font-size: 1.6rem;
            width: 35px;
            text-align: center;
            color: #777;
        }

        .sidebar-nav .nav-item:hover {
            background-color: #F7F7F7;
            transform: translateX(3px);
        }

        .sidebar-nav .nav-item.active {
            background-color: #e5f6f9; 
            color: var(--primary-blue);
        }

        .sidebar-nav .nav-item.active i {
            color: var(--primary-blue);
        }

        /* =========================================
           SIDEBAR DERECHO (PEGADO A LA DERECHA)
           ========================================= */
        .right-sidebar {
            position: fixed;
            right: 0;
            top: 0;
            width: var(--right-panel-width);
            height: 100vh;
            padding: 30px;
            border-left: 2px solid var(--abeja-gray-light);
            background-color: var(--abeja-white);
            z-index: 100;
            display: flex;
            flex-direction: column;
        }

        /* =========================================
           CONTENIDO CENTRAL
           ========================================= */
        .app-main {
            margin-left: var(--sidebar-width);
            margin-right: var(--right-panel-width);
            flex-grow: 1; 
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 0; 
        }

        /* =========================================
           CABECERA PEGAJOSA
           ========================================= */
        .sticky-header-area {
            position: sticky;
            top: 0;
            z-index: 50;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--abeja-white);
            padding: 15px 20px 0px 20px;
        }

        .sticky-header-area::after {
            content: '';
            position: absolute;
            bottom: -35px;
            left: 0;
            width: 100%;
            height: 35px;
            background: linear-gradient(to bottom, rgba(255,255,255,1) 0%, rgba(255,255,255,0) 100%);
            pointer-events: none;
        }

        .sticky-header-content {
            width: 100%;
            max-width: 650px;
        }

        .top-stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px; 
            padding: 5px 10px;
        }

        .section-header {
            width: 100%;
            border-radius: 20px;
            padding: 20px 25px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: var(--primary-blue);
            box-shadow: 0 5px 15px rgba(120, 204, 221, 0.4);
            margin-bottom: 0;
        }

        .header-info .step-title {
            font-size: 0.95rem;
            font-weight: 800;
            opacity: 0.9;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .header-info .section-title {
            margin: 5px 0 0 0;
            font-size: 1.6rem;
            font-weight: 900;
        }

        .btn-guide {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.4);
            border-radius: 14px;
            padding: 10px 18px;
            font-weight: 800;
            text-transform: uppercase;
            transition: background 0.2s, transform 0.1s;
            font-size: 0.9rem;
        }

        .btn-guide:hover {
            background-color: rgba(255, 255, 255, 0.3);
            transform: scale(1.03);
        }

        /* =========================================
           CONTENEDOR DE LA RUTA Y NODOS
           ========================================= */
        .path-container {
            width: 100%;
            max-width: 650px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 20px 120px 20px; 
        }

        .path-nodes {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            position: relative;
        }

        .node-wrapper {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            width: 100%;
            height: 110px; 
        }

        .node-wrapper.tall-wrapper {
            height: 140px; 
        }

        .offset-right-1 { transform: translateX(45px); }
        .offset-right-2 { transform: translateX(90px); }
        .offset-left-1 { transform: translateX(-45px); }
        .offset-left-2 { transform: translateX(-90px); }
        .offset-center { transform: translateX(0); }

        .path-node {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.2rem;
            color: white;
            position: relative;
            cursor: pointer;
            transition: transform 0.1s;
            z-index: 2;
        }

        .path-node:active {
            transform: translateY(6px); 
            border-bottom-width: 2px !important; 
        }

        .node-completed {
            background-color: var(--primary-blue);
            border-bottom: 8px solid var(--primary-blue-dark);
            box-shadow: 0 6px 0 var(--primary-blue-dark);
        }

        .node-chest {
            background-color: var(--secondary-orange);
            border-bottom: 8px solid #CC7800;
            box-shadow: 0 6px 0 #CC7800;
        }

        .node-locked {
            background-color: var(--abeja-gray-light);
            border-bottom: 8px solid var(--abeja-gray-medium);
            color: var(--abeja-gray-dark);
            cursor: not-allowed;
            box-shadow: 0 6px 0 var(--abeja-gray-medium);
        }
        .node-locked:active { transform: none; border-bottom: 8px solid var(--abeja-gray-medium) !important;}

        /* =========================================
           NODO ACTIVO: DISEÑO NATURAL SIN CORTES
           ========================================= */
        .active-node-group {
            position: relative;
            width: 110px; 
            height: 110px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Aura de luz pulsante suave de fondo */
        .active-node-group::before {
            content: '';
            position: absolute;
            top: 15px; left: 15px; right: 15px; bottom: 15px;
            background-color: var(--primary-blue);
            border-radius: 50%;
            filter: blur(12px);
            animation: pulse-glow 2s infinite alternate;
            z-index: 0;
            opacity: 0.5;
        }

        @keyframes pulse-glow {
            from { opacity: 0.2; transform: scale(0.95); }
            to { opacity: 0.6; transform: scale(1.1); }
        }

        /* Botón Estrella: Sombras dinámicas para crear el borde sólido y que baje junto con el botón */
        .active-node-group .node-active {
            width: 85px; /* Ligeramente más grande para resaltar */
            height: 85px;
            background-color: var(--primary-yellow);
            border-bottom: 8px solid var(--primary-yellow-hover);
            color: var(--abeja-dark);
            /* Usamos box-shadow múltiple para crear los bordes exteriores: 
               1. Espacio blanco, 2. Borde azul limpio, 3. Sombra paralela natural */
            box-shadow: 
                0 0 0 4px var(--abeja-bg),
                0 0 0 8px var(--primary-blue),
                0 8px 15px rgba(0, 0, 0, 0.15);
            font-size: 2.5rem;
            z-index: 2;
            transition: transform 0.1s, border-bottom-width 0.1s, box-shadow 0.1s;
        }

        /* Al hacer clic, TODO baja de forma unificada */
        .active-node-group .node-active:active {
            transform: translateY(4px);
            border-bottom-width: 4px !important;
            box-shadow: 
                0 0 0 4px var(--abeja-bg),
                0 0 0 8px var(--primary-blue),
                0 4px 8px rgba(0, 0, 0, 0.1) !important;
        }

        /* Tooltip Animado "EMPEZAR" */
        .tooltip-start {
            position: absolute;
            top: -50px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--primary-blue);
            color: white;
            font-weight: 900;
            padding: 10px 16px;
            border-radius: 14px;
            letter-spacing: 1px;
            z-index: 10;
            animation: bounce-tooltip 2s infinite ease-in-out;
            box-shadow: 0 6px 15px rgba(120, 204, 221, 0.4);
            text-transform: uppercase;
            font-size: 0.9rem;
            white-space: nowrap;
        }

        .tooltip-start::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 9px 9px 0;
            border-style: solid;
            border-color: var(--primary-blue) transparent transparent transparent;
        }

        @keyframes bounce-tooltip {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(-8px); }
        }

        /* =========================================
           WIDGETS Y SIDEBAR DERECHO
           ========================================= */
        .desktop-stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background-color: #F8F9FA;
            border-radius: 16px;
            border: 2px solid var(--abeja-gray-light);
        }

        .text-orange { color: var(--secondary-orange); }

        .widget-card {
            border: 2px solid var(--abeja-gray-light);
            border-radius: 20px;
            padding: 25px;
            background-color: var(--abeja-white);
            margin-top: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.03);
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 0;
            border-bottom: 2px solid #F7F7F7;
        }
        
        .task-item:last-child { border-bottom: none; }

        .task-icon { font-size: 2.2rem; width: 40px; text-align: center; }
        .task-info { flex-grow: 1; }
        .task-info p { margin-bottom: 5px; font-size: 1.05rem; }

        .progress-miel {
            height: 14px;
            border-radius: 10px;
            background-color: #F0F0F0;
            overflow: hidden;
            border: 1px solid var(--abeja-gray-medium);
        }
        
        .progress-miel .progress-bar {
            background-color: var(--secondary-orange);
            background-image: linear-gradient(45deg, rgba(255,255,255,.15) 25%, transparent 25%, transparent 50%, rgba(255,255,255,.15) 50%, rgba(255,255,255,.15) 75%, transparent 75%, transparent);
            background-size: 1rem 1rem;
        }

        .avatar-circle {
            width: 55px; height: 55px;
            border-radius: 50%;
            background-color: var(--primary-yellow);
            color: var(--abeja-dark);
            font-weight: 800;
            font-size: 1.5rem;
            display: flex; align-items: center; justify-content: center;
            border: 3px solid var(--abeja-white);
            box-shadow: 0 0 0 3px var(--primary-yellow);
        }

        /* =========================================
           BARRA INFERIOR MÓVIL
           ========================================= */
        .mobile-bottom-nav {
            display: flex;
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: var(--abeja-white);
            border-top: 2px solid var(--abeja-gray-light);
            justify-content: space-around;
            padding-top: 12px;
            padding-bottom: calc(env(safe-area-inset-bottom, 12px) + 20px);
            z-index: 101;
            height: auto; 
            min-height: 85px;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.05);
        }

        .mobile-bottom-nav .nav-item {
            color: var(--abeja-gray-dark);
            font-size: 1.9rem;
            padding: 10px 15px;
            border-radius: 14px;
            transition: all 0.2s;
            text-decoration: none;
        }

        .mobile-bottom-nav .nav-item.active {
            color: var(--primary-blue);
            background-color: #e5f6f9;
            border: 2px solid #bce6ef;
        }
        @media (min-width: 1200px) {
            .section-header { margin-top: 15px; }
            .path-container { padding-top: 30px; }
        }
        @media (min-width: 769px) {
            .mobile-bottom-nav { display: none !important; }
        }

        /* =========================================
           RESPONSIVIDAD PERFECTA
           ========================================= */
        
        @media (max-width: 1199px) {
            .right-sidebar { display: none !important; }
            .app-main { margin-right: 0; }
            .path-container { padding-top: 30px; }
        }

        @media (max-width: 768px) {
            .app-sidebar { display: none !important; }
            .app-main { margin-left: 0; }
            
            .sticky-header-area { padding: 15px 15px 0px 15px; }
            .top-stats-bar { margin-bottom: 12px; padding: 5px 10px; }
            .section-header { padding: 15px 20px; }
            .path-container { padding-top: 30px; }
            .header-info .section-title { font-size: 1.3rem; }
            .btn-guide { font-size: 0.85rem; padding: 8px 12px;}

            .offset-right-1 { transform: translateX(25px); }
            .offset-right-2 { transform: translateX(50px); }
            .offset-left-1 { transform: translateX(-25px); }
            .offset-left-2 { transform: translateX(-50px); }

            .path-node { width: 75px; height: 75px; font-size: 2rem; }
            
            /* Ajuste del botón activo en móvil */
            .active-node-group .node-active { 
                width: 75px; 
                height: 75px; 
                font-size: 2.2rem; 
                box-shadow: 0 0 0 3px var(--abeja-bg), 0 0 0 6px var(--primary-blue), 0 6px 12px rgba(0, 0, 0, 0.15);
            }
            .active-node-group .node-active:active {
                box-shadow: 0 0 0 4px var(--abeja-bg), 0 0 0 6px var(--primary-blue), 0 3px 6px rgba(0, 0, 0, 0.1) !important;
            }
            .active-node-group { width: 100px; height: 100px; } 
            
            .node-wrapper { height: 105px; }
            .node-wrapper.tall-wrapper { height: 130px; }
            .tooltip-start { top: -45px; font-size: 0.85rem; padding: 8px 14px;}
        }

        @media (max-width: 360px) {
            .offset-right-1 { transform: translateX(15px); }
            .offset-right-2 { transform: translateX(30px); }
            .offset-left-1 { transform: translateX(-15px); }
            .offset-left-2 { transform: translateX(-30px); }
            
            .stat-item.fs-5 { font-size: 1.1rem !important; }
            .header-info .step-title { font-size: 0.8rem; }
        }
    </style>
</head>

<body class="app-body">

    <div class="app-layout">
        
        <aside class="app-sidebar d-none d-md-flex">
            <a href="#" class="sidebar-brand">
                <i class="fa-solid fa-bug"></i> <span>Abeja Go</span>
            </a>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active">
                    <i class="fa-solid fa-house"></i> <span>Aprender</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fa-solid fa-crosshairs"></i> <span>Misiones</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fa-solid fa-store"></i> <span>Tienda</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fa-solid fa-user"></i> <span>Perfil</span>
                </a>
                <a href="#" class="nav-item">
                    <i class="fa-solid fa-ellipsis"></i> <span>Más</span>
                </a>
            </nav>
        </aside>

        <main class="app-main">
            
            <div class="sticky-header-area">
                <div class="sticky-header-content">
                    
                    <div class="top-stats-bar d-xl-none">
                        <div class="stat-item fs-4" title="Curso: Álgebra">
                            <i class="fa-solid fa-square-root-variable text-secondary"></i>
                        </div>
                        <div class="stat-item text-orange fs-5 fw-bold">
                            <i class="fa-solid fa-fire me-1"></i> 14
                        </div>
                        <div class="stat-item text-primary fs-5 fw-bold" style="color: var(--primary-blue) !important;">
                            <i class="fa-solid fa-droplet me-1"></i> 776
                        </div>
                        <div class="stat-item text-danger fs-5 fw-bold">
                            <i class="fa-solid fa-heart me-1"></i> ∞
                        </div>
                    </div>

                    <header class="section-header">
                        <div class="header-info">
                            <span class="step-title">SECCIÓN 1, ÁLGEBRA FUNDAMENTAL</span>
                            <h2 class="section-title">Introducción a Ecuaciones</h2>
                        </div>
                        <button class="btn btn-guide">
                            <i class="fa-solid fa-book-open me-2"></i> Guía
                        </button>
                    </header>
                </div>
            </div>

            <div class="path-container">
                
                <div class="path-nodes">

                    <div class="node-wrapper offset-right-1">
                        <button class="path-node node-completed">
                            <i class="fa-solid fa-check"></i>
                        </button>
                    </div>

                    <div class="node-wrapper offset-right-2">
                        <button class="path-node node-completed">
                            <i class="fa-solid fa-check"></i>
                        </button>
                    </div>

                    <div class="node-wrapper offset-right-1">
                        <button class="path-node node-chest">
                            <i class="fa-solid fa-box-open"></i>
                        </button>
                    </div>

                    <div class="node-wrapper tall-wrapper offset-center">
                        <div class="active-node-group">
                            <div class="tooltip-start">EMPEZAR</div>
                            <button class="path-node node-active"> 
                                <i class="fa-solid fa-star"></i>
                            </button>
                        </div>
                    </div>

                    <div class="node-wrapper offset-left-1">
                        <button class="path-node node-locked">
                            <i class="fa-solid fa-crown"></i>
                        </button>
                    </div>

                    <div class="node-wrapper offset-left-2">
                        <button class="path-node node-locked">
                            <i class="fa-solid fa-dumbbell"></i>
                        </button>
                    </div>

                    <div class="section-divider my-4 text-center w-100" style="border-top: 2px solid #E5E5E5; position: relative;">
                        <span style="background: var(--abeja-bg); padding: 0 15px; position: relative; top: -12px; color: #AAA; font-weight: 800; text-transform: uppercase;">Ecuaciones de 1er Grado</span>
                    </div>

                    <div class="node-wrapper offset-center">
                        <button class="path-node" style="background-color: #CE82FF; border-bottom: 8px solid #A568CC; box-shadow: 0 6px 0 #A568CC;">
                            <i class="fa-solid fa-forward-step"></i>
                        </button>
                    </div>
                </div>
            </div>
        </main>

        <aside class="right-sidebar d-none d-xl-flex">
            <div class="desktop-stats-bar">
                <div class="stat-item fs-4" title="Curso: Álgebra">
                    <i class="fa-solid fa-square-root-variable text-secondary"></i>
                </div>
                <div class="stat-item text-orange fs-5 fw-bold">
                    <i class="fa-solid fa-fire me-1"></i> 14
                </div>
                <div class="stat-item fs-5 fw-bold" style="color: var(--primary-blue);">
                    <i class="fa-solid fa-droplet me-1"></i> 776
                </div>
                <div class="stat-item text-danger fs-5 fw-bold">
                    <i class="fa-solid fa-heart me-1"></i> ∞
                </div>
            </div>

            <div class="widget-card honey-theme">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h5 class="m-0">Misiones del día</h5>
                    <a href="#" class="text-uppercase fw-bold text-decoration-none" style="color: var(--primary-blue); font-size: 0.9rem;">Ver todas</a>
                </div>
                
                <div class="task-item">
                    <div class="task-icon text-warning"><i class="fa-solid fa-bolt"></i></div>
                    <div class="task-info">
                        <p class="m-0 fw-bold">Gana 50 EXP</p>
                        <div class="progress progress-miel">
                            <div class="progress-bar" role="progressbar" style="width: 40%"></div>
                        </div>
                        <small class="text-muted fw-bold">20 / 50</small>
                    </div>
                </div>

                <div class="task-item">
                    <div class="task-icon text-success"><i class="fa-solid fa-bullseye"></i></div>
                    <div class="task-info">
                        <p class="m-0 fw-bold">Despeja 3 variables perfectas</p>
                        <div class="progress progress-miel">
                            <div class="progress-bar" role="progressbar" style="width: 0%"></div>
                        </div>
                        <small class="text-muted fw-bold">0 / 3</small>
                    </div>
                </div>
            </div>
