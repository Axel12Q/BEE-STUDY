name: Desplegar Abeja Go a Azure
on:
  push:
    branches:
      - main
jobs:
  web-deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - name: Get latest code
      uses: actions/checkout@v4  # <-- Actualizado a v4

    - name: Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5 # <-- Actualizado a la última
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        server-dir: /site/wwwroot/